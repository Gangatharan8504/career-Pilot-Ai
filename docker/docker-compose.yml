version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: careerpilot-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - careerpilot-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: careerpilot-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/data
    networks:
      - careerpilot-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: careerpilot-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/careerpilot
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - mongodb
      - chromadb
    networks:
      - careerpilot-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: careerpilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - careerpilot-network

volumes:
  mongo-data:
  chroma-data:

networks:
  careerpilot-network:
    driver: bridge
